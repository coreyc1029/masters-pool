<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Masters Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --green-deep:  #0d3526;
  --green-mid:   #1a5c3f;
  --gold:        #c8a850;
  --gold-light:  #e2c97e;
  --gold-pale:   #f5ead0;
  --cream:       #faf8f3;
  --cream-mid:   #f0ead8;
  --cream-dark:  #e0d8c4;
  --ink:         #1a1a18;
  --ink-mid:     #3d3d38;
  --ink-light:   #7a7a72;
  --ink-ghost:   #b0afa8;
  --red:         #b83228;
  --red-pale:    #fdf0ee;
  --under:       #b83228;
  --over:        #1a1a18;
  --even-score:  #3d3d38;
  --border:      #ddd5be;
  --border-lt:   #eee8d8;
  --white:       #ffffff;
  --shadow:      0 1px 4px rgba(13,53,38,0.07);
  --r-sm: 5px; --r-md: 9px; --r-lg: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}

/* HEADER */
.site-header{background:var(--green-deep);position:relative;overflow:hidden;padding:env(safe-area-inset-top,0) 0 0}
.site-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px);pointer-events:none}
.hdr-inner{position:relative;padding:1.4rem 1.25rem .9rem;text-align:center}
.hdr-eye{font-size:.63rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(226,201,126,.6);margin-bottom:.35rem}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:1.95rem;font-weight:600;color:var(--gold);letter-spacing:.02em;line-height:1.1}
.hdr-sub{font-size:.68rem;font-weight:300;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-top:.3rem}
.hdr-rule{width:44px;height:1px;background:var(--gold);opacity:.35;margin:.65rem auto 0}
.status-strip{background:rgba(0,0,0,.22);padding:.48rem 1.25rem;display:flex;justify-content:space-between;align-items:center;font-size:.67rem;letter-spacing:.03em}
#s-text{color:rgba(255,255,255,.48);display:flex;align-items:center;gap:5px}
#s-cd{color:var(--gold-light);font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold-light);flex-shrink:0;animation:blink 2s ease-in-out infinite}
.dot.err{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tab-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:.85rem .5rem;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);background:none;border:none;border-bottom:2px solid transparent;transition:color .18s,border-color .18s}
.tab-btn.active{color:var(--green-deep);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--ink-mid)}

/* SECTIONS */
.section{display:none}.section.active{display:block}
.page{max-width:960px;margin:0 auto;padding:1.1rem .75rem 4rem}
@media(max-width:639px){.page{padding:.75rem .3rem 3rem}}

/* BANNER */
.banner{display:none;align-items:center;gap:9px;padding:.65rem .9rem;border-radius:var(--r-md);margin-bottom:.85rem;font-size:.78rem;font-weight:500}
.banner.show{display:flex}
.banner-warn{background:#fff8e5;border:1px solid #e8c84a;color:#7a5c00}
.banner-error{background:var(--red-pale);border:1px solid #f5c0b8;color:var(--red)}

/* ============================================================
   POOL TABLE — horizontal grid
   ============================================================ */
.pool-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);width:100%}

.pool-thead{display:grid;grid-template-columns:var(--gc);background:var(--green-deep);padding:.55rem .85rem;border-bottom:2px solid var(--gold)}
.p-th{font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.42);padding:0 4px;text-align:center}
.p-th:first-child{text-align:left;padding-left:0}
.p-th.name-th{text-align:left}
.p-th.total-th{text-align:right;color:rgba(226,201,126,.6)}

.pool-row{display:grid;grid-template-columns:var(--gc);align-items:center;padding:0 .85rem;min-height:58px;border-bottom:1px solid var(--border-lt);opacity:0;transform:translateY(7px);animation:rise .28s ease forwards}
.pool-row:last-child{border-bottom:none}
.pool-row:nth-child(odd){background:var(--cream)}
.pool-row:nth-child(even){background:var(--white)}
.pool-row:hover{background:var(--gold-pale)}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
@media(max-width:639px){
  .pool-thead{padding:.45rem .3rem}
  .pool-row{padding:0 .3rem}
}

/* rank */
.c-rank{display:flex;align-items:center;justify-content:flex-start;padding:0}
.rn{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;line-height:1;color:var(--ink-ghost)}
.rn.r1{color:#c8a850}.rn.r2{color:#9ea8b0}.rn.r3{color:#b07040}

/* name */
.c-name{font-size:.88rem;font-weight:500;color:var(--ink);padding:0 8px 0 5px;white-space:nowrap}

/* player cell */
.c-player{padding:5px 3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-left:1px solid var(--border-lt);min-width:0}
.c-player.dim{opacity:.3}
.pn{font-size:.68rem;font-weight:400;color:var(--ink-mid);text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px}
.ps{font-size:.82rem;font-weight:600;line-height:1;text-align:center}
.ps.under{color:var(--under)}.ps.over{color:var(--over)}.ps.even{color:var(--even-score)}.ps.none{color:var(--ink-ghost);font-weight:300}
.pt{font-size:.58rem;color:var(--ink-ghost);text-align:center;line-height:1}
.cut-tag{font-size:.54rem;font-weight:700;letter-spacing:.03em;background:var(--red);color:#fff;padding:1px 4px;border-radius:3px;display:inline-block}

/* total */
.c-total{text-align:right;padding:0 8px 0 5px;border-right:1px solid var(--border-lt)}
.tv{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;line-height:1}
.tv.under{color:var(--under)}.tv.over{color:var(--over)}.tv.even{color:var(--even-score)}.tv.none{color:var(--ink-ghost);font-size:.88rem;font-family:'Outfit',sans-serif;font-weight:300}
.tn{font-size:.57rem;color:var(--ink-ghost);display:block;margin-top:2px;text-align:right}

/* ============================================================
   MOBILE — responsive grid, no forced scroll in portrait
   ============================================================ */
.pool-table-outer{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.pool-wrap{width:100%}
.mob-picks{display:none}
.pn-short{display:none}
@media(max-width:639px){
  .hdr-title{font-size:1.6rem}
  .c-name{font-size:.75rem;padding:0 4px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
  .pn{font-size:clamp(.44rem,.95vw,.58rem);max-width:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-th{font-size:.48rem;letter-spacing:.06em;padding:0 2px}
  .ps{font-size:.68rem}
  .pt{font-size:.5rem}
  .tv{font-size:1.05rem}
  .rn{font-size:.95rem;min-width:22px}
  .c-player{padding:4px 2px}
  .pool-row{min-height:48px}
  .tn{font-size:.5rem}
}

/* FIELD */
.field-controls{display:flex;gap:8px;margin-bottom:.85rem;align-items:center}
.sw{flex:1;position:relative}
.sw input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--white);font-size:.85rem;color:var(--ink);outline:none;font-family:'Outfit',sans-serif;transition:border-color .18s}
.sw input:focus{border-color:var(--green-mid)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-ghost);font-size:13px;pointer-events:none}
.fb{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--white);font-size:.73rem;font-weight:500;color:var(--ink-mid);white-space:nowrap;transition:background .15s,color .15s}
.fb.on{background:var(--green-deep);color:var(--gold-light);border-color:var(--green-deep)}
.field-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.fhdr{display:grid;grid-template-columns:40px 1fr 44px 58px 58px;padding:7px 12px;background:var(--green-deep);font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.42);gap:8px}
.fhdr span:nth-child(4),.fhdr span:nth-child(5){text-align:right}
.frow{display:grid;grid-template-columns:40px 1fr 44px 58px 58px;padding:9px 12px;border-bottom:1px solid var(--border-lt);gap:8px;align-items:center;font-size:.82rem;transition:background .13s}
.frow:last-child{border-bottom:none}
.frow:hover{background:var(--cream)}
.frow.cut{background:var(--red-pale)}.frow.cut:hover{background:#fbe5e2}
.frow.inpool{background:#eaf3ee}.frow.inpool:hover{background:#daeee3}
.fp{font-weight:500;color:var(--ink-mid);font-size:.76rem}
.fn{font-weight:500;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftier{font-size:.57rem;font-weight:600;letter-spacing:.04em;padding:2px 5px;border-radius:3px;display:inline-block;white-space:nowrap;background:var(--green-deep);color:var(--gold-light)}
.ftier.t2{background:#1a4a7a;color:#a8ccf0}.ftier.t3{background:#4a2a7a;color:#cdb8f0}
.ftier.t4{background:#6a4010;color:#f0cc90}.ftier.t5{background:#1a5a2a;color:#90d0a0}
.ftier.t6{background:#505048;color:#c8c8c0}.ftier.tn{background:var(--cream-dark);color:var(--ink-light)}
.fs{text-align:right;font-weight:600}
.fs.under{color:var(--under)}.fs.over{color:var(--over)}.fs.even{color:var(--even-score)}
.fth{text-align:right;font-size:.7rem;color:var(--ink-ghost)}

.state-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:3rem 2rem;text-align:center;box-shadow:var(--shadow)}
.state-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;margin-bottom:.4rem}
.state-body{font-size:.8rem;color:var(--ink-light);line-height:1.6}
.rfooter{text-align:center;font-size:.66rem;color:var(--ink-ghost);padding:.7rem 0 0;letter-spacing:.03em}
</style>
</head>
<body>

<header class="site-header">
  <div class="hdr-inner">
    <p class="hdr-eye">Augusta National</p>
    <h1 class="hdr-title">Masters Pool 2026</h1>
    <p class="hdr-sub">April 10 – 13</p>
    <div class="hdr-rule"></div>
  </div>
  <div class="status-strip">
    <span id="s-text"><span class="dot err" id="sdot"></span>Scores not yet loaded</span>
    <span id="s-cd"></span>
  </div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('pool')">Pool</button>
  <button class="tab-btn"        onclick="showTab('field')">Field</button>
</nav>

<section id="tab-pool" class="section active">
  <div class="page">
    <div id="pool-banner" class="banner"></div>
    <div id="pool-content"></div>
    <p class="rfooter" id="pool-footer">Best 4 of 6 scores count · Cut penalty +10 applied before selection · Refreshes every 5 min</p>
  </div>
</section>

<section id="tab-field" class="section">
  <div class="page">
    <div id="field-banner" class="banner"></div>
    <div class="field-controls">
      <div class="sw"><span class="si">⌕</span><input type="search" id="fsearch" placeholder="Search players…" oninput="renderField()" autocomplete="off"/></div>
      <button class="fb" id="pfbtn" onclick="togglePF()">Pool only</button>
    </div>
    <div id="field-content"></div>
  </div>
</section>

<script>
/* ============================================================
   ① PARTICIPANTS  ← edit here to add / change picks
   ============================================================ */
const PARTICIPANTS = [
  { name:"Dylan",     picks:["Bryson DeChambeau","Brooks Koepka",    "Jordan Spieth",  "Max Homa",          "Sergio Garcia",   "Mason Howell"]      },
  { name:"Carlos",    picks:["Bryson DeChambeau","Tommy Fleetwood",   "Patrick Reed",   "Corey Conners",     "Tom McKibbin",    "Davis Riley"]       },
  { name:"Josh",      picks:["Jon Rahm",          "Matt Fitzpatrick", "Patrick Reed",   "Corey Conners",     "Aaron Rai",       "Sami Valimaki"]     },
  { name:"Corey",     picks:["Scottie Scheffler", "Tommy Fleetwood",  "Jordan Spieth",  "Sepp Straka",       "Brian Harman",    "Aldrich Potgieter"] },
  { name:"Christian", picks:["Bryson DeChambeau","Justin Rose",       "Patrick Reed",   "Jacob Bridgeman",   "Brian Harman",    "Fifa Laopakdee"]    },
  { name:"Daniel",    picks:["Ludvig Åberg",      "Cameron Young",    "Akshay Bhatia",  "Corey Conners",     "Ryan Gerard",     "John Keefer"]       },
  { name:"Jesper",    picks:["Bryson DeChambeau","Tommy Fleetwood",   "Justin Thomas",  "Sepp Straka",       "Aaron Rai",       "Aldrich Potgieter"] },
  { name:"Benedikt",  picks:["Rory McIlroy",      "Justin Rose",      "Patrick Reed",   "Cameron Smith",     "Alex Noren",      "Brian Campbell"]    },
  { name:"Javier",    picks:["Jon Rahm",           "Cameron Young",   "Patrick Reed",   "Corey Conners",     "Matt McCarty",    "Davis Riley"]       },
  { name:"Tom",       picks:["Scottie Scheffler", "Tommy Fleetwood",  "Min Woo Lee",    "Nicolai Højgaard",  "Ryan Gerard",     "Sami Valimaki"]     },
  { name:"Miguel",    picks:["Xander Schauffele",  "Cameron Young",   "Jake Knapp",     "Corey Conners",     "Max Greyserman",  "Zach Johnson"]      },
];

/* ② SCORING */
const N_PICKS   = 6;
const N_COUNT   = 4;
const CUT_PEN   = 10;

/* ③ TIERS */
const TIERS = {
  1:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Bryson DeChambeau","Ludvig Åberg","Xander Schauffele"],
  2:["Cameron Young","Tommy Fleetwood","Matt Fitzpatrick","Collin Morikawa","Justin Rose","Robert MacIntyre","Brooks Koepka","Hideki Matsuyama"],
  3:["Chris Gotterup","Jordan Spieth","Patrick Reed","Si Woo Kim","Viktor Hovland","Russell Henley","Min Woo Lee","Justin Thomas","Patrick Cantlay","Akshay Bhatia","Adam Scott","Jason Day","Tyrrell Hatton","Jake Knapp"],
  4:["Shane Lowry","Sam Burns","J.J. Spaun","Sepp Straka","Corey Conners","Nicolai Højgaard","Kurt Kitayama","Jacob Bridgeman","Maverick McNealy","Cameron Smith","Harris English","Gary Woodland","Daniel Berger","Ben Griffin","Sungjae Im","Max Homa","Rasmus Højgaard","Keegan Bradley","Marco Penge","Harry Hall","Alex Noren"],
  5:["Ryan Gerard","Nick Taylor","Aaron Rai","Brian Harman","Sam Stevens","Ryan Fox","Wyndham Clark","Sergio Garcia","Michael Kim","Max Greyserman","Dustin Johnson","Kristoffer Reitan","Casey Jarvis","Carlos Ortiz","Tom McKibbin","Haotong Li","Nico Echavarria","Matt McCarty","Andrew Novak","Rasmus Neergaard-Petersen","Aldrich Potgieter"],
  6:["Sami Valimaki","John Keefer","Michael Brennan","Davis Riley","Charl Schwartzel","Bubba Watson","Zach Johnson","Brian Campbell","Ethan Fang","Danny Willett","Angel Cabrera","Fifa Laopakdee","Mason Howell","Vijay Singh","Mateo Pulcini","Jackson Herrington","Naoyuki Kataoka","Mike Weir","Fred Couples","Jose Maria Olazabal","Brandon Holtz"],
};

/* ④ ESPN NAME OVERRIDES
   Left = your tier list name, Right = ESPN displayName exactly as it appears */
const NAME_MAP = {
  "Ludvig Åberg":              "Ludvig Aberg",
  "Rasmus Neergaard-Petersen": "Rasmus Neergaard Petersen",
  "Fifa Laopakdee":            "Fifa Laopakdee",
  "John Keefer":               "John Keefer",
};

/* ⑤ API */
const ENDPOINTS = [
  "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga",
  "https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard",
];

/* STATE */
let scores={}, lastOk=null, lastGood=false, rTimer=null, nrAt=null, cInt=null, pf=false;
const MS = 5*60*1000;

/* LOOKUPS */
const PT={};
for(const[t,ps]of Object.entries(TIERS)) for(const p of ps) PT[n(p)]=+t;
const PP=new Set(PARTICIPANTS.flatMap(p=>p.picks));

/* UTILS */
function n(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim()}
function espn(x){return NAME_MAP[x]||x}
function tier(x){return PT[n(x)]||null}
function fs(tname){
  const t=espn(tname);
  // 1. Exact key match
  if(scores[t]) return scores[t];
  // 2. Normalised full-name match (handles accents, punctuation)
  const nn=n(t);
  for(const[k,v]of Object.entries(scores)) if(n(k)===nn) return v;
  // 3. Last-name-only match as final fallback (catches ESPN abbreviations)
  const last=nn.split(' ').slice(-1)[0];
  if(last.length>3){
    const hits=Object.entries(scores).filter(([k])=>n(k).split(' ').slice(-1)[0]===last);
    if(hits.length===1) return hits[0][1];
  }
  return null;
}
function revLookup(ename){
  const ne=n(ename);
  for(const[k,v]of Object.entries(NAME_MAP)) if(n(v)===ne) return k;
  for(const ps of Object.values(TIERS)) for(const p of ps) if(n(p)===ne) return p;
  return null;
}
function fmt(v){if(v===null||v===undefined)return'–';if(v===0)return'E';return v>0?`+${v}`:`${v}`}
function cl(v){if(v===null||v===undefined)return'none';if(v===0)return'even';return v<0?'under':'over'}

/* SCORING */
function calc(picks){
  const wp=picks.map(name=>{
    const d=fs(name);
    const eff=d===null?null:d.cut?d.score+CUT_PEN:d.score;
    return{name,eff,cut:d?.cut??false,thru:d?.thru??''};
  });
  const res=[...wp].filter(p=>p.eff!==null).sort((a,b)=>a.eff-b.eff);
  const counting=new Set(res.slice(0,N_COUNT).map(p=>p.name));
  const total=res.length>=N_COUNT?res.slice(0,N_COUNT).reduce((s,p)=>s+p.eff,0):null;
  return{total,players:wp.map(p=>({...p,counting:counting.has(p.name)}))};
}

/* FETCH */
async function fetchScores(){
  let data=null,err=null;
  for(const url of ENDPOINTS){
    try{
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      data=await r.json();
      if(data?.events?.length)break;
    }catch(e){err=e;data=null}
  }
  if(!data){fail(err);sched();return}
  const evs=data.events||[];
  const ev=evs.find(e=>/masters/i.test(e.name||''))||evs.find(e=>/augusta/i.test(e.name||''))||evs[0];
  if(!ev){fail(new Error('not found'));sched();return}
  parse(ev);
  lastOk=new Date();lastGood=true;
  setS('ok');clrB('pool-banner');clrB('field-banner');
  sched();renderPool();renderField();
}

function parseScore(raw){
  // Handles: "-3", "+2", "2", "E", "", undefined, null
  if(raw===null||raw===undefined||raw==='')return null;
  const s=String(raw).trim();
  if(s==='E'||s==='Even')return 0;
  const n=parseInt(s,10);
  return isNaN(n)?null:n;
}

function parse(ev){
  scores={};
  const competitors=ev.competitions?.[0]?.competitors||[];
  for(const c of competitors){
    const name=c.athlete?.displayName||c.athlete?.fullName||'';
    if(!name)continue;

    // status.detail = "E(16)", "-3(F)", "+5(F)", "-1(9)" — most reliable field.
    // Format is always score(holes) or score(F). Parse the score portion.
    let num=null;
    const detail=c.status?.detail||c.status?.todayDetail||'';
    if(detail){
      // Extract everything before the first "(" — e.g. "-3" from "-3(F)"
      const raw=detail.replace(/\(.*$/,'').trim();
      num=parseScore(raw);
    }

    // Fallback: statistics scoreToPar
    if(num===null){
      const stats=c.statistics||[];
      const sp=stats.find(s=>s.name==='scoreToPar');
      if(sp)num=parseScore(sp.displayValue??String(sp.value));
    }

    // Fallback: score.displayValue
    if(num===null)num=parseScore(c.score?.displayValue);

    if(num===null)num=0;

    const sn=(c.status?.type?.name||'').toUpperCase();
    const sd=(c.status?.type?.description||'').toLowerCase();
    const cut=sn==='STATUS_CUT'||sd.includes('cut')||sd.includes('wd')||sd.includes('withdrew')||sd.includes('dq');
    const sv=c.status?.displayValue||'';
    const tr=c.status?.thru;
    const thru=sv==='F'||sv==='F*'?'F':tr!=null?`Thru ${tr}`:sv||'';
    scores[name]={score:num,cut,thru};
  }
}

function fail(e){
  console.warn('[Pool]',e);lastGood=false;setS('err');
  const m=lastOk?`⚠ Could not refresh — showing scores from ${lastOk.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}.`:'✕ Could not load scores. Will retry automatically.';
  showB('pool-banner',lastOk?'warn':'error',m);
  showB('field-banner',lastOk?'warn':'error',m);
}

/* SCHEDULING */
function sched(){
  if(rTimer)clearTimeout(rTimer);
  nrAt=Date.now()+MS;rTimer=setTimeout(fetchScores,MS);startCD();
}
function startCD(){
  if(cInt)clearInterval(cInt);
  cInt=setInterval(()=>{
    if(!nrAt)return;
    const s=Math.max(0,Math.round((nrAt-Date.now())/1000));
    const el=document.getElementById('s-cd');
    if(el)el.textContent=`Refresh in ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    if(s===0)clearInterval(cInt);
  },1000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){clearTimeout(rTimer);clearInterval(cInt)}
  else{if(nrAt&&Date.now()>nrAt)fetchScores();else sched()}
});

/* STATUS */
function setS(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('s-text');
  if(s==='ok'){dot.className='dot';txt.innerHTML=`<span class="dot" id="sdot"></span>Updated ${lastOk.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`}
  else{dot.className='dot err';txt.innerHTML=`<span class="dot err" id="sdot"></span>Score fetch failed — retrying`}
}
function showB(id,type,msg){const el=document.getElementById(id);if(el){el.className=`banner show banner-${type}`;el.textContent=msg}}
function clrB(id){const el=document.getElementById(id);if(el)el.className='banner'}

/* RENDER POOL */
function renderPool(){
  const el=document.getElementById('pool-content');if(!el)return;
  const noS=!Object.keys(scores).length;

  const rows=PARTICIPANTS.map(p=>({name:p.name,...calc(p.picks)}))
    .sort((a,b)=>{if(a.total===null&&b.total===null)return 0;if(a.total===null)return 1;if(b.total===null)return-1;return a.total-b.total});

  const ranks=[];let pos=1;
  for(let i=0;i<rows.length;i++){
    if(i>0&&rows[i].total!==null&&rows[i].total===rows[i-1].total)ranks.push(ranks[i-1]);
    else ranks.push(rows[i].total!==null?pos:null);
    if(rows[i].total!==null)pos++;
  }

  // Responsive columns: rank | name | total | 6 pick columns
  // clamp() lets each fixed column shrink gracefully on narrow screens
  const gc=`clamp(20px,4vw,28px) clamp(60px,14vw,110px) clamp(44px,9vw,68px) repeat(${N_PICKS},minmax(0,1fr))`;

  const thCols=['','Participant','Total',...Array.from({length:N_PICKS},(_,i)=>`Pick ${i+1}`)];
  const thead=`<div class="pool-thead" style="--gc:${gc}">${thCols.map((l,i)=>`<div class="p-th${i===2?' total-th':''}${i===1?' name-th':''}">${l}</div>`).join('')}</div>`;

  const rnk=(r)=>r===1?`<span class="rn r1">①</span>`:r===2?`<span class="rn r2">②</span>`:r===3?`<span class="rn r3">③</span>`:r?`<span class="rn">${r}</span>`:`<span class="rn">–</span>`;

  const tbody=rows.map((row,i)=>{
    const r=ranks[i];
    const td=row.total!==null?fmt(row.total):'–';
    const tc=row.total!==null?cl(row.total):'none';

    const pcells=row.players.map(p=>{
      const sc=p.eff!==null?fmt(p.eff):'–';
      const sc2=p.eff!==null?cl(p.eff):'none';
      const last=p.name.split(' ').slice(-1)[0];
      return`<div class="c-player${p.counting?'':' dim'}">
        <span class="pn">${last}</span>
        <span class="ps ${sc2}">${noS?'–':sc}</span>
        ${p.cut?`<span class="cut-tag">CUT</span>`:`<span class="pt">${p.thru||''}</span>`}
      </div>`;
    }).join('');

    const mchips=row.players.map(p=>{
      const sc=p.eff!==null?fmt(p.eff):'–';
      const sc2=p.eff!==null?cl(p.eff):'none';
      const last=p.name.split(' ').slice(-1)[0];
      return`<div class="mob-chip${p.counting?'':' dim'}">
        <span class="mc-n">${last}</span>
        <span class="mc-s ${sc2}">${noS?'–':sc}</span>
        ${p.cut?`<span class="cut-tag" style="font-size:.5rem">CUT</span>`:''}
      </div>`;
    }).join('');

    return`<div class="pool-row" style="--gc:${gc};animation-delay:${i*.04}s">
      <div class="c-rank">${rnk(r)}</div>
      <div class="c-name">${row.name}</div>
      <div class="c-total"><div class="tv ${tc}">${td}</div>${row.total!==null?`<span class="tn">best ${N_COUNT}</span>`:''}</div>
      ${pcells}
    </div>`;
  }).join('');

  el.innerHTML=`<div class="pool-table-outer"><div class="pool-wrap">${thead}${tbody}</div></div>`;
  const ft=document.getElementById('pool-footer');
  if(ft&&lastOk)ft.textContent=`Best ${N_COUNT} of ${N_PICKS} scores count · Cut +${CUT_PEN} applied before selection · Updated ${lastOk.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

/* RENDER FIELD */
function renderField(){
  const el=document.getElementById('field-content');if(!el)return;
  if(!Object.keys(scores).length){
    el.innerHTML=`<div class="state-box"><div class="state-title">Tournament not started</div><div class="state-body">The full field will appear once the Masters begins on Thursday.</div></div>`;return;
  }
  const q=(document.getElementById('fsearch')?.value||'').toLowerCase();
  let ents=Object.entries(scores).map(([name,d])=>{
    const tn=revLookup(name);
    return{name,tierName:tn,tier:tn?tier(tn):null,inPool:tn?PP.has(tn):false,...d};
  }).sort((a,b)=>{if(a.cut&&!b.cut)return 1;if(!a.cut&&b.cut)return-1;return a.score-b.score});
  if(q)ents=ents.filter(e=>e.name.toLowerCase().includes(q));
  if(pf)ents=ents.filter(e=>e.inPool);
  if(!ents.length){el.innerHTML=`<div class="state-box"><div class="state-body">No players match.</div></div>`;return}
  let p=0;
  const rows=ents.map(e=>{
    const dp=e.cut?'CUT':String(++p);
    const t=e.tier;const tc=t?`t${t}`:'tn';const tl=t?`T${t}`:'–';
    const sc2=cl(e.score);
    return`<div class="frow${e.cut?' cut':''}${e.inPool?' inpool':''}">
      <span class="fp">${dp}</span>
      <div><div class="fn">${e.name}</div><span class="ftier ${tc}">${tl}</span></div>
      <span></span>
      <span class="fs ${sc2}">${fmt(e.score)}</span>
      <span class="fth">${e.thru||''}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="field-wrap"><div class="fhdr"><span>Pos</span><span>Player</span><span></span><span>Score</span><span>Thru</span></div>${rows}</div>`;
}

/* TABS & FILTER */
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['pool','field'][i]===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  if(id==='field')renderField();
}
function togglePF(){
  pf=!pf;document.getElementById('pfbtn').classList.toggle('on',pf);renderField();
}

/* BOOT */
renderPool();
fetchScores();
</script>
